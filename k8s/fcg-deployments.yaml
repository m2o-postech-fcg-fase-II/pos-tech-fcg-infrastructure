apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  selector:
    matchLabels:
      app: rabbitmq
  replicas: 1
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4.1.6-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
---
# Users API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      containers:
        - name: users-api
          image: fcg-users-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: USERS_ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: USERS_ASPNETCORE_URLS
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: USERS_CONNECTIONSTRING
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: RABBITMQ_HOST
            - name: RabbitMq__Port
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: RABBITMQ_PORT
            - name: RabbitMq__Username
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: RABBITMQ_USERNAME
            - name: RabbitMq__Password
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: RABBITMQ_PASSWORD
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: JWT_AUDIENCE
            - name: Jwt__ExpiryMinutes
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: JWT_EXPIRY_MINUTES
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
