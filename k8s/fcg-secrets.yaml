apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
type: Opaque
stringData:
  # Substitua pela sua chave real ou use `kubectl create secret generic jwt-secret --from-file=secrets/jwt_secret`
  jwt: "REPLACE_WITH_YOUR_JWT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "postgres123"